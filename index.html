<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Woops</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4f46e5">
</head>
<body>
  <!-- Экран входа -->
  <section id="auth-screen" class="screen active">
    <div class="auth-box">
      <h1>Woops</h1>
      <input type="tel" id="auth-phone" placeholder="+7 (999) 000-00-00">
      <input type="email" id="auth-email" placeholder="Email">
      <input type="password" id="auth-pass" placeholder="Пароль (мин. 6 символов)">
      <button id="login-btn">Войти</button>
      <button id="register-btn" class="secondary">Регистрация</button>
      <p id="auth-error" class="error"></p>
    </div>
  </section>

  <!-- Главный экран -->
  <section id="main-screen" class="screen">
    <header class="top-bar">
      <h2 id="tab-title">Чаты</h2>
      <button id="menu-btn">⋮</button>
    </header>
    <main class="tabs-content">
      <div id="tab-chats" class="tab active">
        <ul id="chat-list" class="list"></ul>
        <button class="fab" id="new-chat">✏️</button>
      </div>
      <div id="tab-status" class="tab"><p class="empty">Статусы пока пусты</p></div>
      <div id="tab-calls" class="tab"><p class="empty">Нет звонков</p></div>
      <div id="tab-profile" class="tab">
        <div class="profile-card">
          <div class="avatar" id="my-avatar">👤</div>
          <h3 id="my-name">Загрузка...</h3>
          <p id="my-status">В сети</p>
          <button id="edit-profile">Редактировать</button>
          <button id="logout-btn" class="danger">Выйти</button>
        </div>
      </div>
    </main>
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="chats">💬 Чаты</button>
      <button class="nav-btn" data-tab="status">🟢 Статус</button>
      <button class="nav-btn" data-tab="calls">📞 Звонки</button>
      <button class="nav-btn" data-tab="profile">👤 Профиль</button>
    </nav>
  </section>

  <!-- Экран чата -->
  <section id="chat-screen" class="screen">
    <header class="chat-top">
      <button id="back-btn">←</button>
      <div class="contact-info">
        <div class="avatar small" id="chat-avatar">👤</div>
        <div>
          <h4 id="chat-name">Контакт</h4>
          <small id="chat-online">в сети</small>
        </div>
      </div>
    </header>
    <div class="messages" id="msg-area"></div>
    <footer class="input-area">
      <button id="attach-btn">📎</button>
      <input type="file" id="file-input" hidden accept="image/*,.pdf,.doc,.docx">
      <button id="voice-btn">🎤</button>
      <input type="text" id="text-input" placeholder="Сообщение...">
      <button id="send-btn">➤</button>
    </footer>
  </section>

  <!-- Firebase + приложение -->
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
