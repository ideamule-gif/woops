<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woops</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth-screen" class="screen">
    <div class="card" style="max-width:320px; margin:auto;">
        <h2 style="text-align:center; margin-bottom:20px; color:var(--primary);">Woops</h2>
        <input type="email" id="email" placeholder="Email" style="margin-bottom:10px;">
        <input type="password" id="password" placeholder="Пароль" style="margin-bottom:20px;">
        <p id="auth-error" style="color:var(--danger); text-align:center; font-size:13px; margin-bottom:10px; min-height:18px;"></p>
        <div style="display:flex; gap:10px;">
            <button id="login-btn" class="btn primary" style="flex:1;">Войти</button>
            <button id="register-btn" class="btn secondary" style="flex:1;">Рег.</button>
        </div>
    </div>
</div>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="main-screen" class="screen">
    <header class="main-header">
        <div class="header-left"><h2>Woops</h2></div>
        <button id="logout-btn" class="icon-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
    </header>

    <div class="tabs-container">
        <!-- ЧАТЫ -->
        <div id="tab-chats" class="tab active">
            <input type="text" id="chat-search" placeholder="Поиск чатов..." style="margin-bottom:12px;">
            <div id="chat-list"></div>
        </div>

        <!-- КОНТАКТЫ -->
        <div id="tab-contacts" class="tab">
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <input type="text" id="contact-search" placeholder="Поиск..." style="flex:1;">
                <button id="add-contact-btn" class="btn primary" style="padding:0 12px;">+</button>
            </div>
            <div id="contacts-list"></div>
        </div>

        <!-- ЗАМЕТКИ -->
        <div id="tab-notes" class="tab">
            <div class="notes-header">
                <button id="add-note-btn" class="btn primary small">+ Заметка</button>
                <button id="notes-view-toggle" class="note-view-toggle">▦</button>
            </div>
            <div id="notes-list" class="notes-grid"></div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="tab-profile" class="tab">
            <div class="profile-header">
                <button id="open-settings" class="icon-btn settings-btn">⚙️</button>
                <img id="profile-big-avatar" src="" class="avatar" style="width:80px; height:80px; margin-bottom:10px;">
                <h3 id="profile-display-name">Имя</h3>
                <p id="profile-display-username" class="text-muted" style="font-size:13px;">@username</p>
            </div>
            
            <div style="background:var(--bg-card); padding:16px; border-radius:16px; border:1px solid var(--border);">
                <h4 style="margin-bottom:12px;">Выберите аватар</h4>
                <div class="avatar-grid" id="avatar-selection-grid">
                    <!-- Генерируется JS -->
                </div>
                <label>Отображаемое имя</label>
                <input type="text" id="input-name" style="margin-bottom:10px;">
                <label>Имя пользователя (для поиска)</label>
                <input type="text" id="input-username" placeholder="@username" style="margin-bottom:10px;">
                <label>О себе</label>
                <input type="text" id="input-status" placeholder="Статус..." style="margin-bottom:16px;">
                <button id="save-profile" class="btn primary full">Сохранить</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="chats"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></span><span>Чаты</span></button>
        <button class="nav-btn" data-tab="contacts"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span><span>Контакты</span></button>
        <button class="nav-btn" data-tab="notes"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span>Заметки</span></button>
        <button class="nav-btn" data-tab="profile"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Профиль</span></button>
    </nav>
</div>

<!-- ЭКРАН ЧАТА -->
<div id="chat-screen" class="screen">
    <header class="chat-header">
        <button id="back-btn" class="icon-btn">←</button>
        <img id="chat-avatar" src="" class="avatar small">
        <div><h4 id="chat-name" style="font-size:16px;">Имя</h4><span id="chat-status" style="font-size:12px; color:var(--text-muted);">...</span></div>
    </header>
    <div id="msg-area" class="msg-area"></div>
    <footer class="chat-footer">
        <button id="emojiToggle" class="icon-btn">☺</button>
        <div id="emoji-panel" class="emoji-panel">
            <div id="emoji-grid" class="emoji-grid"></div>
        </div>
        <div class="input-wrapper" style="flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:6px 12px;">
            <input type="text" id="text-input" placeholder="Сообщение..." style="border:none; padding:4px; background:transparent;">
        </div>
        <button id="send-btn" class="btn primary" style="border-radius:50%; width:40px; height:40px; padding:0;">→</button>
    </footer>
</div>

<!-- МОДАЛКИ -->
<dialog id="addContactModal" class="modal">
    <div class="modal-box">
        <h3 style="margin-bottom:16px;">Добавить контакт</h3>
        <input type="email" id="new-contact-email" placeholder="Email друга" style="margin-bottom:16px;">
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn secondary" onclick="this.closest('dialog').close()">Отмена</button>
            <button id="confirm-add-contact" class="btn primary">Добавить</button>
        </div>
    </div>
</dialog>

<dialog id="noteEditorModal" class="modal">
    <div class="modal-box">
        <input type="text" id="note-title-input" placeholder="Заголовок" style="margin-bottom:12px; font-weight:bold;">
        <textarea id="note-body-input" rows="6" placeholder="Текст заметки..." style="margin-bottom:16px; resize:none;"></textarea>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="delete-note-btn" class="btn danger" style="margin-right:auto; display:none;">Удалить</button>
            <button class="btn secondary" onclick="this.closest('dialog').close()">Отмена</button>
            <button id="save-note-btn" class="btn primary">Сохранить</button>
        </div>
    </div>
</dialog>

<dialog id="settingsModal" class="modal">
    <div class="modal-box">
        <h3 style="margin-bottom:20px;">Настройки</h3>
        <div class="list-item" id="theme-toggle-btn">
            <span style="flex:1;">Ночной режим (Звездный)</span>
            <span id="theme-switch-indicator" style="font-size:20px;">⚪</span>
        </div>
        <div style="text-align:right; margin-top:16px;">
            <button class="btn secondary" onclick="this.closest('dialog').close()">Закрыть</button>
        </div>
    </div>
</dialog>

<script type="module" src="app.js"></script>
</body>
</html>
