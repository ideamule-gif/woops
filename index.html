<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Woops Messenger</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://image.qwenlm.ai/public_source/05c2a9cd-f215-45a4-ae2d-4fc10115155e/1f29e67b2-2e97-4791-908c-a0cc68149258.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <div class="auth-card glass-card">
            <div class="auth-logo">
                <img src="https://image.qwenlm.ai/public_source/05c2a9cd-f215-45a4-ae2d-4fc10115155e/1f29e67b2-2e97-4791-908c-a0cc68149258.png" alt="Woops Logo" class="logo-img">
                <h2>Woops</h2>
                <p>Вход в аккаунт</p>
            </div>
            <form id="auth-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Пароль" required autocomplete="off">
                </div>
                <p id="auth-error" class="error-text"></p>
                <div class="auth-buttons">
                    <button type="button" id="login-btn" class="btn primary">Войти</button>
                    <button type="button" id="register-btn" class="btn secondary">Регистрация</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="main-screen" class="screen">
        <header class="main-header glass-blur">
            <div class="header-left">
                <img id="user-avatar-header" src="https://ui-avatars.com/api/?name=U&background=6366f1&color=fff" class="header-avatar" alt="Avatar">
                <div class="header-info">
                    <h3 id="tab-title">Чаты</h3>
                    <p class="header-status">в сети</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="add-contact-btn" class="icon-btn" title="Добавить контакт">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                </button>
                <button id="logout-btn" class="icon-btn" title="Выйти">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="tabs-container">
            <!-- Чаты -->
            <div id="tab-chats" class="tab active">
                <div class="search-bar glass-card">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="chat-search" placeholder="Поиск по чатам...">
                </div>
                <ul id="chat-list" class="chat-list">
                    <!-- Список чатов -->
                </ul>
                <div id="chats-empty" class="empty-state" style="display: none;">
                    <div class="empty-icon">💬</div>
                    <p>Пока никого нет.</p>
                    <button id="add-contact-empty-btn" class="btn primary small">Добавить контакт</button>
                </div>
                <div id="loading-chats" class="loading-state">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>
            </div>

            <!-- Статус -->
            <div id="tab-status" class="tab">
                <div class="status-content">
                    <div class="status-card glass-card">
                        <h4>Мой статус</h4>
                        <p class="text-muted">Нажмите "Редактировать профиль" чтобы изменить</p>
                        <div id="my-status-display" class="status-display">
                            <span class="status-badge online">Онлайн</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Звонки -->
            <div id="tab-calls" class="tab">
                <div class="empty-state">
                    <div class="empty-icon">📞</div>
                    <p>История звонков пока пуста</p>
                </div>
            </div>

            <!-- Профиль -->
            <div id="tab-profile" class="tab">
                <div class="profile-summary glass-card">
                    <img id="profile-preview-main" src="" class="avatar huge" alt="Profile">
                    <h3 id="profile-name-main">Пользователь</h3>
                    <p class="text-muted" id="profile-status-text-main">Нажмите "Редактировать" для изменений</p>
                    <button id="edit-profile" class="btn primary mt-4">Редактировать профиль</button>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav glass-blur">
            <button class="nav-btn active" data-tab="chats">
                <div class="nav-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
                </div>
                <span>Чаты</span>
            </button>
            <button class="nav-btn" data-tab="status">
                <div class="nav-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <span>Статус</span>
            </button>
            <button class="nav-btn" data-tab="calls">
                <div class="nav-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                </div>
                <span>Звонки</span>
            </button>
            <button class="nav-btn" data-tab="profile">
                <div class="nav-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <!-- Экран чата -->
    <div id="chat-screen" class="screen">
        <header class="chat-header glass-blur">
            <button id="back-btn" class="icon-btn back">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <img id="chat-avatar" src="" class="avatar" alt="Chat Avatar">
            <div class="chat-header-info">
                <h4 id="chat-name">Собеседник</h4>
                <span id="chat-status" class="text-muted">в сети</span>
            </div>
            <div class="chat-actions">
                <button id="edit-profile-mobile" class="icon-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                </button>
            </div>
        </header>

        <div id="msg-area" class="msg-area">
            <!-- Сообщения -->
        </div>

        <footer class="chat-footer glass-blur">
            <button id="emojiToggle" class="icon-btn">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <div class="emoji-picker" id="emojiPicker">
                <!-- Эмодзи будут добавлены через JS -->
            </div>
            <div class="input-wrapper">
            <input type="text" 
       id="text-input" 
       placeholder="Сообщение..." 
       autocomplete="off" 
       autocapitalize="none" 
       autocorrect="off" 
       spellcheck="false" 
       inputmode="text"
       data-form-type="other"
       data-lpignore="true">
            </div>
            <button id="send-btn" class="icon-btn send">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </footer>
    </div>

    <!-- Модальное окно профиля -->
    <dialog id="profileModal" class="modal">
        <div class="modal-box glass-card">
            <div class="modal-header">
                <h3>Редактировать профиль</h3>
                <button id="closeProfile" class="icon-btn close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="avatar-upload">
                    <img id="avatarPreview" src="" class="avatar huge" alt="Preview">
                    <label for="avatarInput" class="btn secondary small">Загрузить фото</label>
                    <input type="file" id="avatarInput" accept="image/*" hidden>
                </div>
                <div class="input-group">
                    <label>Имя</label>
                    <input type="text" id="displayName" placeholder="Ваше имя" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Статус</label>
                    <select id="userStatus">
                        <option value="online">В сети</option>
                        <option value="busy">Занят</option>
                        <option value="away">Отошёл</option>
                        <option value="offline">Не в сети</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Текст статуса</label>
                    <input type="text" id="statusText" placeholder="Чем занимаетесь?" autocomplete="off">
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelProfile" class="btn secondary">Отмена</button>
                <button id="saveProfile" class="btn primary">Сохранить</button>
            </div>
        </div>
    </dialog>

    <!-- Модальное окно добавления контакта -->
    <dialog id="addContactModal" class="modal">
        <div class="modal-box glass-card">
            <div class="modal-header">
                <h3>Новый контакт</h3>
                <button id="closeAddContact" class="icon-btn close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Имя контакта</label>
                    <input type="text" id="contactName" placeholder="Имя друга" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Email для приглашения</label>
                    <input type="email" id="contactEmail" placeholder="friend@email.com" autocomplete="off">
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelAddContact" class="btn secondary">Отмена</button>
                <button id="sendInvite" class="btn primary">Отправить</button>
            </div>
        </div>
    </dialog>

    <!-- Toast уведомления -->
    <div id="toast" class="toast"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
