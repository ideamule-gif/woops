<!DOCTYPE html>
<html lang="ru">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;

    :root {
      --primary: #2AABEE;
      --primary-dark: #229ED9;
      --bg: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-chat: #e5ddd5;
      --bg-chat-pattern: #efeae2;
      --text: #1a1a1a;
      --text-secondary: #707579;
      --text-muted: #999;
      --border: #e0e0e0;
      --bubble-out: #e3f2fd;
      --bubble-in: #ffffff;
      --danger: #ff3b30;
      --success: #34c759;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-lg: 16px;
      --nav-height: 64px;
      --header-height: 56px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--bg);
    }
    .screen.active {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideOutRight {
      from { transform: translateX(0); }
      to { transform: translateX(100%); }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===== AUTH SCREEN ===== */
    #auth-screen {
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 24px;
    }

    .auth-card {
      background: var(--bg);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: popIn 0.4s ease;
    }

    .auth-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .auth-card h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .auth-card > p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .auth-input-group {
      position: relative;
      margin-bottom: 14px;
    }

    .auth-input-group i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    .auth-input-group input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
      background: var(--bg-secondary);
      outline: none;
    }

    .auth-input-group input:focus {
      border-color: var(--primary);
      background: var(--bg);
      box-shadow: 0 0 0 4px rgba(42, 171, 238, 0.1);
    }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 13px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
    }

    .btn.primary:hover {
      box-shadow: 0 6px 18px rgba(102, 126, 234, 0.45);
    }

    .btn.secondary {
      background: var(--bg-secondary);
      color: var(--text);
    }

    .btn.secondary:hover {
      background: #e8e8e8;
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .btn.sm {
      padding: 8px 16px;
      font-size: 13px;
    }

    /* ===== MAIN SCREEN ===== */
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      min-height: var(--header-height);
      flex-shrink: 0;
    }

    .main-header h1 {
      font-size: 22px;
      font-weight: 700;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      color: var(--text);
    }

    .icon-btn:hover {
      background: var(--bg-secondary);
    }

    .icon-btn.send {
      background: var(--primary);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
    }

    .icon-btn.send:active {
      background: var(--primary-dark);
    }

    .tabs-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab {
      display: none;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab.active {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.2s ease;
    }

    /* ===== CHAT LIST ===== */
    .chat-list {
      list-style: none;
      padding: 0;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .chat-item:hover {
      background: var(--bg-secondary);
    }

    .chat-item:active {
      background: #ececec;
    }

    .chat-item .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }

    .chat-item-content {
      flex: 1;
      min-width: 0;
    }

    .chat-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .chat-item-name {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-time {
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-left: 8px;
    }

    .chat-item-time.unread {
      color: var(--primary);
      font-weight: 600;
    }

    .chat-item-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-item-last {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .unread-badge {
      background: var(--primary);
      color: white;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 15px;
      text-align: center;
      padding: 40px;
      line-height: 1.6;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* ===== STATUS TAB ===== */
    .status-wrapper {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .my-profile-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .avatar-zone {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }

    .avatar.big {
      width: 96px;
      height: 96px;
    }

    .avatar.huge {
      width: 120px;
      height: 120px;
    }

    .avatar {
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-secondary);
    }

    .status-indicator {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid var(--bg);
    }

    .status-indicator.online { background: var(--success); }
    .status-indicator.busy { background: var(--danger); }
    .status-indicator.away { background: #ff9500; }

    .profile-info h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-info .text-muted {
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* ===== CALLS TAB ===== */
    #tab-calls {
      padding: 0;
    }

    /* ===== PROFILE TAB ===== */
    .mobile-profile-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }

    .mobile-profile-wrapper h2 {
      font-size: 24px;
      margin: 16px 0 4px;
    }

    .mobile-profile-wrapper .text-muted {
      margin-bottom: 24px;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      display: flex;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      flex-shrink: 0;
      min-height: var(--nav-height);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 0;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
      font-family: inherit;
      min-height: var(--nav-height);
    }

    .nav-btn.active {
      color: var(--primary);
    }

    .nav-btn .nav-icon {
      font-size: 22px;
    }

    .nav-btn .nav-label {
      font-size: 11px;
      font-weight: 500;
    }

    .mobile-only {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-only {
        display: flex !important;
      }
    }

    /* ===== CHAT SCREEN ===== */
    #chat-screen.active {
      animation: slideInRight 0.25s ease;
    }

    .chat-header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      padding-top: max(8px, env(safe-area-inset-top));
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      min-height: var(--header-height);
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 38px;
      height: 38px;
    }

    .chat-meta {
      flex: 1;
    }

    .chat-meta h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-meta .status-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .msg-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg-chat-pattern);
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8c1b8' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      -webkit-overflow-scrolling: touch;
    }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg-wrapper.out {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-wrapper.in {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-bubble {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
      box-shadow: 0 1px 1px rgba(0,0,0,0.06);
    }

    .msg-wrapper.out .msg-bubble {
      background: var(--bubble-out);
      border-bottom-right-radius: 4px;
    }

    .msg-wrapper.in .msg-bubble {
      background: var(--bubble-in);
      border-bottom-left-radius: 4px;
    }

    .msg-wrapper.out + .msg-wrapper.out .msg-bubble {
      border-top-right-radius: 4px;
    }

    .msg-wrapper.in + .msg-wrapper.in .msg-bubble {
      border-top-left-radius: 4px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      padding: 0 4px;
    }

    .msg-date-divider {
      text-align: center;
      margin: 12px 0;
    }

    .msg-date-divider span {
      background: rgba(0,0,0,0.08);
      color: var(--text-secondary);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 8px;
      font-weight: 500;
    }

    /* ===== CHAT FOOTER ===== */
    .chat-footer {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-end;
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 4px 4px 4px 8px;
      position: relative;
    }

    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      padding: 8px 4px;
      outline: none;
      min-height: 36px;
      max-height: 120px;
    }

    .input-wrapper .icon-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    /* ===== EMOJI PICKER ===== */
    .emoji-picker {
      display: none;
      position: absolute;
      bottom: 50px;
      left: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      box-shadow: var(--shadow-lg);
      z-index: 10;
      width: 280px;
      max-height: 200px;
      overflow-y: auto;
      flex-wrap: wrap;
      gap: 4px;
    }

    .emoji-picker.active {
      display: flex;
      animation: slideUp 0.2s ease;
    }

    .emoji-picker span {
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
      line-height: 1;
    }

    .emoji-picker span:hover {
      background: var(--bg-secondary);
    }

    /* ===== MODAL ===== */
    .modal {
      border: none;
      padding: 0;
      margin: 0;
      background: transparent;
      max-width: 100%;
      max-height: 100%;
    }

    .modal::backdrop {
      background: rgba(0,0,0,0.5);
      animation: fadeIn 0.2s ease;
    }

    .modal[open] .modal-box {
      animation: slideUp 0.3s ease;
    }

    .modal-box {
      background: var(--bg);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-width: 440px;
      margin: auto;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 17px;
      font-weight: 600;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-upload {
      position: relative;
      margin-bottom: 24px;
    }

    .avatar-upload img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-secondary);
    }

    .upload-badge {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      border: 3px solid var(--bg);
    }

    .form-group {
      width: 100%;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
      background: var(--bg);
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(42, 171, 238, 0.1);
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== FAB BUTTON ===== */
    .fab {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(42, 171, 238, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 5;
    }

    .fab:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(42, 171, 238, 0.5);
    }

    .fab:active {
      transform: scale(0.95);
    }

    /* ===== ADD CONTACT MODAL ===== */
    .add-contact-body {
      padding: 24px 20px;
    }

    .add-contact-body .form-group input {
      width: 100%;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 4px;
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 769px) {
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e8e8e8;
      }
      .screen {
        max-width: 420px;
        max-height: 800px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: var(--shadow-lg);
      }
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-items: center;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ==================== ЭКРАН АВТОРИЗАЦИИ ==================== -->
  <div id="auth-screen" class="screen active">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-comment-dots"></i>
      </div>
      <h2>Woops</h2>
      <p id="auth-subtitle">Вход в аккаунт</p>

      <div class="auth-input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      </div>
      <div class="auth-input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="auth-pass" placeholder="Пароль" autocomplete="current-password">
      </div>
      <div id="auth-error" class="error-msg"></div>

      <div class="auth-buttons">
        <button id="login-btn" class="btn primary">Войти</button>
        <button id="register-btn" class="btn secondary">Регистрация</button>

  <!-- ==================== ГЛАВНЫЙ ЭКРАН ==================== -->
  <div id="main-screen" class="screen">
    <header class="main-header">
      <h1 id="tab-title">Чаты</h1>
      <button id="logout-btn" class="icon-btn" aria-label="Выйти">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </header>

    <div class="tabs-container">

      <!-- Чаты -->
      <section id="tab-chats" class="tab active">
        <ul id="chat-list" class="chat-list"></ul>
        <div id="chats-empty" class="empty-state" style="display: none;">
          <i class="fas fa-comments"></i>
          Пока никого нет.<br>Добавьте первый контакт! 🧐
        </div>
        <button id="fab-add" class="fab" aria-label="Добавить контакт">
          <i class="fas fa-plus"></i>
        </button>
      </section>

      <!-- Статус -->
      <section id="tab-status" class="tab">
        <div class="status-wrapper">
          <div class="my-profile-card">
            <div class="avatar-zone">
              <img id="my-avatar" src="" alt="Мой аватар" class="avatar big">
              <span id="my-status-dot" class="status-indicator online"></span>
            </div>
            <div class="profile-info">
              <h3 id="my-name">Загрузка...</h3>
              <p id="my-status-text" class="text-muted">—</p>
            </div>
            <button id="edit-profile" class="btn primary sm">Изменить профиль</button>
          </div>
        </div>
      </section>

      <!-- Звонки -->
      <section id="tab-calls" class="tab">
        <div class="empty-state">
          <i class="fas fa-phone"></i>
          История звонков пока пуста 📞
        </div>
      </section>

      <!-- Профиль (мобильный) -->
      <section id="tab-profile" class="tab mobile-only">
        <div class="mobile-profile-wrapper">
          <img id="my-avatar-mobile" src="" alt="Аватар" class="avatar huge">
          <div class="avatar-zone" style="position:absolute;bottom:-4px;right:calc(50% - 60px);">
            <span id="my-status-dot-mobile" class="status-indicator online" style="border-color:white;"></span>
          </div>
          <h2 id="my-name-mobile">Загрузка...</h2>
          <p id="my-status-mobile" class="text-muted"></p>
          <button id="edit-profile-mobile" class="btn primary">Редактировать профиль</button>
        </div>
      </section>

    </div>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="chats">
        <span class="nav-icon"><i class="fas fa-comment"></i></span>
        <span class="nav-label">Чаты</span>
      </button>
      <button class="nav-btn" data-tab="status">
        <span class="nav-icon"><i class="fas fa-circle-notch"></i></span>
        <span class="nav-label">Статус</span>
      </button>
      <button class="nav-btn" data-tab="calls">
        <span class="nav-icon"><i class="fas fa-phone"></i></span>
        <span class="nav-label">Звонки</span>
      </button>
      <button class="nav-btn mobile-only" data-tab="profile">
        <span class="nav-icon"><i class="fas fa-user"></i></span>
        <span class="nav-label">Профиль</span>
      </button>
    </nav>
  </div>

  <!-- ==================== ЭКРАН ЧАТА ==================== -->
  <div id="chat-screen" class="screen">
    <header class="chat-header">
      <button id="back-btn" class="icon-btn">
        <i class="fas fa-arrow-left"></i>
      </button>
      <img id="chat-avatar" src="" alt="" class="avatar">
      <div class="chat-meta">
        <h3 id="chat-name">Собеседник</h3>
        <span id="chat-status" class="status-text">в сети</span>
      </div>
    </header>

    <div id="msg-area" class="msg-area"></div>

    <footer class="chat-footer">
      <div class="input-wrapper">
        <button id="emojiToggle" class="icon-btn" aria-label="Эмодзи">
          <i class="far fa-smile"></i>
        </button>
        <input type="text" id="text-input" placeholder="Сообщение..." autocomplete="off">
        <div id="emojiPicker" class="emoji-picker"></div>
      </div>
      <button id="send-btn" class="icon-btn send" aria-label="Отправить">
        <i class="fas fa-paper-plane"></i>
      </button>
    </footer>
  </div>

  <!-- ==================== МОДАЛКА ПРОФИЛЯ ==================== -->
  <dialog id="profileModal" class="modal">
    <div class="modal-box">
      <header class="modal-header">
        <h3>Редактировать профиль</h3>
        <button id="closeProfile" class="close-btn">
          <i class="fas fa-times"></i>
        </button>
      </header>
      <div class="modal-body">
        <div class="avatar-upload">
          <img id="avatarPreview" src="" alt="Превью аватара">
          <label for="avatarInput" class="upload-badge">
            <i class="fas fa-camera"></i>
          </label>
          <input type="file" id="avatarInput" accept="image/*" style="display:none">
        </div>

        <div class="form-group">
          <label>Имя</label>
          <input type="text" id="displayName" placeholder="Ваше имя">
        </div>
        <div class="form-group">
          <label>Статус</label>
          <select id="userStatus">
            <option value="online">В сети</option>
            <option value="busy">Занят</option>
            <option value="away">Отошёл</option>
          </select>
        </div>
        <div class="form-group">
          <label>Текст статуса</label>
          <input type="text" id="statusText" placeholder="Чем сейчас занимаетесь?">
        </div>
      </div>
      <footer class="modal-footer">
        <button id="cancelProfile" class="btn secondary">Отмена</button>
        <button id="saveProfile" class="btn primary">Сохранить</button>
      </footer>
    </div>
  </dialog>

  <!-- ==================== МОДАЛКА ДОБАВЛЕНИЯ КОНТАКТА ==================== -->
  <dialog id="addContactModal" class="modal">
    <div class="modal-box">
      <header class="modal-header">
        <h3>Новый контакт</h3>
        <button id="closeAddContact" class="close-btn">
          <i class="fas fa-times"></i>
        </button>
      </header>
      <div class="add-contact-body">
        <div class="form-group">
          <label>Имя контакта</label>
          <input type="text" id="contactName" placeholder="Как зовут?">
        </div>
        <div class="form-group">
          <label>Цвет аватара</label>
          <input type="color" id="contactColor" value="#667eea" style="height:48px;padding:4px;cursor:pointer;">
        </div>
      </div>
      <footer class="modal-footer">
        <button id="cancelAddContact" class="btn secondary">Отмена</button>
        <button id="confirmAddContact" class="btn primary">Добавить</button>
      </footer>
    </div>
  </dialog>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // ===== DATA LAYER =====
    const DB = {
      get(key) {
        try { return JSON.parse(localStorage.getItem('woops_' + key)); } catch { return null; }
      },
      set(key, val) {
        localStorage.setItem('woops_' + key, JSON.stringify(val));
      },
      remove(key) {
        localStorage.removeItem('woops_' + key);
      }
    };

    // ===== STATE =====
    let currentUser = null;
    let activeChat = null;
    let emojiOpen = false;

    // ===== EMOJIS =====
    const EMOJIS = ['😀','😂','🥹','😍','🤩','😎','🥳','😢','😡','🤔','👍','👎','❤️','🔥','⭐','🎉','💯','🙏','👋','🤝','💪','🫡','😴','🤗','😏','😬','🤯','🥺','💀','👀','🌈','☀️','🌙','🍕','☕','🎵','📱','💻','🏠','✈️','🎮','⚽','🏆','🎁','💎','🐱','🐶','🌸','🍀','🌊'];

    // ===== DEFAULT AVATAR =====
    function defaultAvatar(name, color = '#667eea') {
      const c = document.createElement('canvas');
      c.width = 100; c.height = 100;
      const ctx = c.getContext('2d');
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(50, 50, 50, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 42px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const letter = (name || '?').charAt(0).toUpperCase();
      ctx.fillText(letter, 50, 52);
      return c.toDataURL();
    }

    // ===== TOAST =====
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== TIME HELPERS =====
    function formatTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 86400000 && d.getDate() === now.getDate()) return 'Сегодня';
      if (diff < 172800000) return 'Вчера';
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatChatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 86400000 && d.getDate() === now.getDate()) return formatTime(ts);
      if (diff < 172800000) return 'Вчера';
      return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    // ===== NAVIGATION =====
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      document.querySelector(`.nav-btn[data-tab="${tabName}"]`).classList.add('active');

      const titles = { chats: 'Чаты', status: 'Статус', calls: 'Звонки', profile: 'Профиль' };
      document.getElementById('tab-title').textContent = titles[tabName] || 'Woops';
    }

    // ===== AUTH =====
    function handleAuth(isLogin) {
      const email = document.getElementById('auth-email').value.trim();
      const pass = document.getElementById('auth-pass').value.trim();
      const errEl = document.getElementById('auth-error');

      if (!email || !pass) {
        errEl.textContent = 'Заполните все поля';
        return;
      }
      if (!email.includes('@')) {
        errEl.textContent = 'Некорректный email';
        return;
      }

      const users = DB.get('users') || {};

      if (isLogin) {
        if (!users[email]) {
          errEl.textContent = 'Пользователь не найден';
          return;
        }
        if (users[email].password !== pass) {
          errEl.textContent = 'Неверный пароль';
          return;
        }
        currentUser = users[email];
        DB.set('currentUser', email);
        toast('Добро пожаловать! 👋');
        enterMain();
      } else {
        if (users[email]) {
          errEl.textContent = 'Этот email уже зарегистрирован';
          return;
        }
        const name = email.split('@')[0];
        users[email] = {
          email,
          password: pass,
          displayName: name,
          status: 'online',
          statusText: 'Привет! Я использую Woops',
          avatar: '',
          color: '#667eea',
          contacts: [],
          messages: {}
        };
        DB.set('users', users);
        currentUser = users[email];
        DB.set('currentUser', email);
        toast('Аккаунт создан! 🎉');
        enterMain();
      }
    }

    function enterMain() {
      showScreen('main-screen');
      renderProfile();
      renderChatList();
    }

    // ===== PROFILE =====
    function renderProfile() {
      if (!currentUser) return;
      const avatarSrc = currentUser.avatar || defaultAvatar(currentUser.displayName, currentUser.color);
      document.getElementById('my-avatar').src = avatarSrc;
      document.getElementById('my-avatar-mobile').src = avatarSrc;
      document.getElementById('my-name').textContent = currentUser.displayName;
      document.getElementById('my-name-mobile').textContent = currentUser.displayName;

      const statusLabel = { online: 'В сети', busy: 'Занят', away: 'Отошёл' };
      document.getElementById('my-status-text').textContent = currentUser.statusText || statusLabel[currentUser.status];
      document.getElementById('my-status-mobile').textContent = currentUser.statusText || statusLabel[currentUser.status];

      const dot = document.getElementById('my-status-dot');
      const dotM = document.getElementById('my-status-dot-mobile');
      if (dot) { dot.className = 'status-indicator ' + currentUser.status; }
      if (dotM) { dotM.className = 'status-indicator ' + currentUser.status; }
    }

    function openProfileModal() {
      document.getElementById('displayName').value = currentUser.displayName;
      document.getElementById('userStatus').value = currentUser.status;
      document.getElementById('statusText').value = currentUser.statusText;
      document.getElementById('avatarPreview').src = currentUser.avatar || defaultAvatar(currentUser.displayName, currentUser.color);
      document.getElementById('profileModal').showModal();
    }

    function saveProfile() {
      const name = document.getElementById('displayName').value.trim();
      const status = document.getElementById('userStatus').value;
      const statusText = document.getElementById('statusText').value.trim();

      if (!name) { toast('Имя не может быть пустым'); return; }

      currentUser.displayName = name;
      currentUser.status = status;
      currentUser.statusText = statusText;

      const users = DB.get('users') || {};
      users[currentUser.email] = currentUser;
      DB.set('users', users);

      document.getElementById('profileModal').close();
      renderProfile();
      toast('Профиль обновлён ✅');
    }

    // ===== AVATAR UPLOAD =====
    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const c = document.createElement('canvas');
          const size = 200;
          c.width = size; c.height = size;
          const ctx = c.getContext('2d');
          const min = Math.min(img.width, img.height);
          const sx = (img.width - min) / 2;
          const sy = (img.height - min) / 2;
          ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
          const dataUrl = c.toDataURL('image/jpeg', 0.8);
          currentUser.avatar = dataUrl;
          document.getElementById('avatarPreview').src = dataUrl;
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ===== CONTACTS / CHAT LIST =====
    function openAddContact() {
      document.getElementById('contactName').value = '';
      document.getElementById('contactColor').value = '#667eea';
      document.getElementById('addContactModal').showModal();
    }

    function addContact() {
      const name = document.getElementById('contactName').value.trim();
      const color = document.getElementById('contactColor').value;
      if (!name) { toast('Введите имя'); return; }

      if (!currentUser.contacts) currentUser.contacts = [];

      // Check duplicate
      if (currentUser.contacts.find(c => c.name === name)) {
        toast('Такой контакт уже есть');
        return;
      }

      const contact = {
        id: 'contact_' + Date.now(),
        name,
        color,
        avatar: '',
        lastSeen: Date.now(),
        status: 'online',
        statusText: 'Привет! Я использую Woops'
      };

      currentUser.contacts.push(contact);

      if (!currentUser.messages) currentUser.messages = {};
      currentUser.messages[contact.id] = [];

      const users = DB.get('users') || {};
      users[currentUser.email] = currentUser;
      DB.set('users', users);

      document.getElementById('addContactModal').close();
      renderChatList();
      toast(`${name} добавлен в контакты`);
    }

    function renderChatList() {
      const list = document.getElementById('chat-list');
      const empty = document.getElementById('chats-empty');
      list.innerHTML = '';

      if (!currentUser.contacts || currentUser.contacts.length === 0) {
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';

      // Sort by last message time
      const contacts = [...currentUser.contacts].sort((a, b) => {
        const msgsA = (currentUser.messages[a.id] || []);
        const msgsB = (currentUser.messages[b.id] || []);
        const timeA = msgsA.length ? msgsA[msgsA.length - 1].timestamp : 0;
        const timeB = msgsB.length ? msgsB[msgsB.length - 1].timestamp : 0;
        return timeB - timeA;
      });

      contacts.forEach(contact => {
        const msgs = currentUser.messages[contact.id] || [];
        const lastMsg = msgs[msgs.length - 1];
        const unread = msgs.filter(m => !m.read && !m.out).length;
        const avatarSrc = contact.avatar || defaultAvatar(contact.name, contact.color);

        const li = document.createElement('li');
        li.className = 'chat-item';
        li.innerHTML = `
          <img src="${avatarSrc}" alt="${contact.name}" class="avatar">
          <div class="chat-item-content">
            <div class="chat-item-top">
              <span class="chat-item-name">${contact.name}</span>
              ${lastMsg ? `<span class="chat-item-time ${unread ? 'unread' : ''}">${formatChatTime(lastMsg.timestamp)}</span>` : ''}
            </div>
            <div class="chat-item-bottom">
              <span class="chat-item-last">${lastMsg ? (lastMsg.out ? 'Вы: ' : '') + lastMsg.text : 'Начните общение...'}</span>
              ${unread ? `<span class="unread-badge">${unread}</span>` : ''}
            </div>
          </div>
        `;
        li.addEventListener('click', () => openChat(contact));
        list.appendChild(li);
      });
    }

    // ===== CHAT =====
    function openChat(contact) {
      activeChat = contact;
      showScreen('chat-screen');

      const avatarSrc = contact.avatar || defaultAvatar(contact.name, contact.color);
      document.getElementById('chat-avatar').src = avatarSrc;
      document.getElementById('chat-name').textContent = contact.name;

      const statusLabel = { online: 'в сети', busy: 'занят', away: 'отошёл' };
      document.getElementById('chat-status').textContent = statusLabel[contact.status] || 'был(а) недавно';

      renderMessages();

      // Mark all as read
      if (currentUser.messages[contact.id]) {
        currentUser.messages[contact.id].forEach(m => { m.read = true; });
        saveUser();
      }
    }

    function renderMessages() {
      const area = document.getElementById('msg-area');
      area.innerHTML = '';

      if (!activeChat || !currentUser.messages) return;
      const msgs = currentUser.messages[activeChat.id] || [];

      let lastDate = '';
      msgs.forEach(msg => {
        const msgDate = formatDate(msg.timestamp);
        if (msgDate !== lastDate) {
          lastDate = msgDate;
          const divider = document.createElement('div');
          divider.className = 'msg-date-divider';
          divider.innerHTML = `<span>${msgDate}</span>`;
          area.appendChild(divider);
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper ' + (msg.out ? 'out' : 'in');
        wrapper.innerHTML = `
          <div class="msg-bubble">${escapeHtml(msg.text)}</div>
          <span class="msg-time">${formatTime(msg.timestamp)} ${msg.out ? '✓✓' : ''}</span>
        `;
        area.appendChild(wrapper);
      });

      area.scrollTop = area.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function sendMessage() {
      const input = document.getElementById('text-input');
      const text = input.value.trim();
      if (!text || !activeChat) return;

      if (!currentUser.messages[activeChat.id]) {
        currentUser.messages[activeChat.id] = [];
      }

      currentUser.messages[activeChat.id].push({
        text,
        timestamp: Date.now(),
        out: true,
        read: false
      });

      saveUser();
      input.value = '';
      renderMessages();
      closeEmoji();

      // Simulate reply
      simulateReply();
    }

    function simulateReply() {
      const chatId = activeChat.id;
      const contact = activeChat;

      setTimeout(() => {
        if (activeChat && activeChat.id === chatId) {
          document.getElementById('chat-status').textContent = 'печатает...';
        }
      }, 800);

      const replies = [
        'Привет! Как дела? 😊',
        'Интересно, расскажи подробнее!',
        'Окей, понял 👍',
        'Хаха, это смешно 😂',
        'Давай обсудим позже',
        'Отличная идея! 🎉',
        'Согласен с тобой',
        'Не знал этого, спасибо!',
        'Круто! 🔥',
        'Ладно, до связи!',
        'А что ты думаешь?',
        'Без проблем!',
        'Увидимся завтра 👋',
        'Жду с нетерпением!',
        'Это потрясающе! ⭐'
      ];

      const delay = 1500 + Math.random() * 2000;

      setTimeout(() => {
        const users = DB.get('users') || {};
        const user = users[currentUser.email];
        if (!user.messages[chatId]) user.messages[chatId] = [];

        user.messages[chatId].push({
          text: replies[Math.floor(Math.random() * replies.length)],
          timestamp: Date.now(),
          out: false,
          read: activeChat && activeChat.id === chatId
        });

        DB.set('users', users);
        currentUser = user;

        if (activeChat && activeChat.id === chatId) {
          renderMessages();
          const statusLabel = { online: 'в сети', busy: 'занят', away: 'отошёл' };
          document.getElementById('chat-status').textContent = statusLabel[contact.status] || 'был(а) недавно';
        } else {
          renderChatList();
        }
      }, delay);
    }

    function saveUser() {
      const users = DB.get('users') || {};
      users[currentUser.email] = currentUser;
      DB.set('users', users);
    }

    // ===== EMOJI =====
    function initEmojiPicker() {
      const picker = document.getElementById('emojiPicker');
      EMOJIS.forEach(emoji => {
        const span = document.createElement('span');
        span.textContent = emoji;
        span.addEventListener('click', () => {
          const input = document.getElementById('text-input');
          input.value += emoji;
          input.focus();
        });
        picker.appendChild(span);
      });
    }

    function toggleEmoji() {
      const picker = document.getElementById('emojiPicker');
      emojiOpen = !emojiOpen;
      picker.classList.toggle('active', emojiOpen);
    }

    function closeEmoji() {
      emojiOpen = false;
      document.getElementById('emojiPicker').classList.remove('active');
    }

    // ===== LOGOUT =====
    function logout() {
      DB.remove('currentUser');
      currentUser = null;
      activeChat = null;
      showScreen('auth-screen');
      document.getElementById('auth-email').value = '';
      document.getElementById('auth-pass').value = '';
      document.getElementById('auth-error').textContent = '';
      toast('Вы вышли из аккаунта');
    }

    // ===== BACK =====
    function goBack() {
      activeChat = null;
      showScreen('main-screen');
      renderChatList();
    }

    // ===== INIT =====
    function init() {
      // Check session
      const sessionEmail = DB.get('currentUser');
      if (sessionEmail) {
        const users = DB.get('users') || {};
        if (users[sessionEmail]) {
          currentUser = users[sessionEmail];
          enterMain();
          return;
        }
      }

      // Auth events
      document.getElementById('login-btn').addEventListener('click', () => handleAuth(true));
      document.getElementById('register-btn').addEventListener('click', () => handleAuth(false));

      // Enter key for auth
      document.getElementById('auth-pass').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleAuth(true);
      });
      document.getElementById('auth-email').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('auth-pass').focus();
      });

      // Nav
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      // Chat
      document.getElementById('send-btn').addEventListener('click', sendMessage);
      document.getElementById('text-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      document.getElementById('back-btn').addEventListener('click', goBack);
      document.getElementById('emojiToggle').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleEmoji();
      });
      document.addEventListener('click', (e) => {
        if (emojiOpen && !e.target.closest('.emoji-picker') && !e.target.closest('#emojiToggle')) {
          closeEmoji();
        }
      });

      // Profile modal
      document.getElementById('edit-profile').addEventListener('click', openProfileModal);
      document.getElementById('edit-profile-mobile').addEventListener('click', openProfileModal);
      document.getElementById('closeProfile').addEventListener('click', () => document.getElementById('profileModal').close());
      document.getElementById('cancelProfile').addEventListener('click', () => document.getElementById('profileModal').close());
      document.getElementById('saveProfile').addEventListener('click', saveProfile);
      document.getElementById('avatarInput').addEventListener('change', handleAvatarUpload);

      // Add contact modal
      document.getElementById('fab-add').addEventListener('click', openAddContact);
      document.getElementById('closeAddContact').addEventListener('click', () => document.getElementById('addContactModal').close());
      document.getElementById('cancelAddContact').addEventListener('click', () => document.getElementById('addContactModal').close());
      document.getElementById('confirmAddContact').addEventListener('click', addContact);

      // Logout
      document.getElementById('logout-btn').addEventListener('click', logout);

      initEmojiPicker();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
