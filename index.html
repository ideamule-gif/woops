<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Woops Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <div class="auth-card">
            <h2>Woops 👋</h2>
            <p>Вход в аккаунт</p>
            <input type="email" id="auth-email" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
            <input type="password" id="auth-password" placeholder="Пароль" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
            <p id="auth-error" style="color: var(--danger); font-size: 14px; min-height: 20px;"></p>
            <button id="login-btn" class="btn primary" style="width: 100%; margin-bottom: 10px;">Войти</button>
            <button id="register-btn" class="btn secondary" style="width: 100%;">Регистрация</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="main-screen" class="screen">
        <header class="main-header">
            <h1 id="tab-title" style="font-size: 22px; font-weight: 700;">Чаты</h1>
            <button id="logout-btn" class="icon-btn" title="Выйти">🚪</button>
        </header>

        <div class="tabs-container">
            <!-- Вкладка: Чаты -->
            <div id="tab-chats" class="tab active">
                <ul id="chat-list" class="chat-list">
                    <li id="chats-empty" class="empty-state">Пока никого нет.<br>Зарегистрируй друзей! 🧐</li>
                </ul>
            </div>

            <!-- Вкладка: Профиль -->
            <div id="tab-profile" class="tab">
                <div style="text-align: center; padding: 40px 20px;">
                    <img id="avatarPreview" class="avatar huge" src="https://ui-avatars.com/api/?name=User" alt="Аватар" style="margin-bottom: 16px;">
                    <h2 id="profile-name-view" style="margin-bottom: 8px;">Пользователь</h2>
                    <p id="profile-status-view" style="color: var(--text-muted); margin-bottom: 24px;">В сети</p>
                    <button id="edit-profile" class="btn primary">Редактировать профиль</button>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="chats">
                <span class="nav-icon">💬</span>
                <span>Чаты</span>
            </button>
            <button class="nav-btn" data-tab="profile">
                <span class="nav-icon">👤</span>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <!-- Экран чата -->
    <div id="chat-screen" class="screen">
        <header class="chat-header">
            <button id="back-btn" class="icon-btn">←</button>
            <img id="chat-avatar" class="avatar" src="" alt="">
            <div class="chat-info">
                <h4 id="chat-name" style="font-size: 16px; font-weight: 600; margin: 0;">Собеседник</h4>
                <p style="font-size: 13px; color: var(--success); margin: 0;">в сети</p>
            </div>
        </header>
        <div id="msg-area" class="msg-area"></div>
        <footer class="chat-footer">
            <button id="emojiToggle" class="icon-btn">😊</button>
            <div class="input-wrapper">
                <input type="text" id="text-input" placeholder="Сообщение..." autocomplete="off">
            </div>
            <button id="send-btn" class="icon-btn send">➤</button>
        </footer>
        <div id="emojiPicker" class="emoji-picker"></div>
    </div>

    <!-- Модалка редактирования профиля -->
    <dialog id="profileModal" class="modal">
        <div class="modal-box">
            <div style="padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 18px;">Редактировать профиль</h3>
                <button id="closeProfile" class="icon-btn">✕</button>
            </div>
            <div style="padding: 24px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px;">Имя</label>
                <input type="text" id="displayName" placeholder="Ваше имя" style="width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px;">Статус</label>
                <select id="userStatus" style="width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                    <option value="online">В сети</option>
                    <option value="busy">Занят</option>
                    <option value="away">Отошёл</option>
                    <option value="offline">Не в сети</option>
                </select>

                <label style="display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px;">Текст статуса</label>
                <input type="text" id="statusText" placeholder="О себе..." style="width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">

                <label style="display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px;">Аватар (файл до 2МБ)</label>
                <input type="file" id="avatarInput" accept="image/*" style="width: 100%; padding: 10px; margin-bottom: 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            <div style="padding: 16px 24px 24px; display: flex; justify-content: flex-end; gap: 12px;">
                <button id="cancelProfile" class="btn secondary">Отмена</button>
                <button id="saveProfile" class="btn primary">Сохранить</button>
            </div>
        </div>
    </dialog>

    <!-- Уведомление -->
    <div id="toast" class="toast"></div>

    <!-- Подключение JS как модуля -->
    <script type="module" src="app.js"></script>
</body>
</html>
