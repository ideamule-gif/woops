<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Woops</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://image.qwenlm.ai/public_source/05c2a9cd-f215-45a4-ae2d-4fc10115155e/1f29e67b2-2e97-4791-908c-a0cc68149258.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== ЭКРАН АВТОРИЗАЦИИ ========== -->
<div id="auth-screen" class="screen">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="https://image.qwenlm.ai/public_source/05c2a9cd-f215-45a4-ae2d-4fc10115155e/1f29e67b2-2e97-4791-908c-a0cc68149258.png" alt="Woops">
            <h2>Woops</h2>
            <p>Вход в аккаунт</p>
        </div>
        <div class="auth-inputs">
            <input type="email" id="email" placeholder="Email" autocomplete="email">
            <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
        </div>
        <p id="auth-error" class="auth-error"></p>
        <div class="auth-btns">
            <button id="login-btn" class="btn primary">Войти</button>
            <button id="register-btn" class="btn secondary">Регистрация</button>
        </div>
    </div>
</div>

<!-- ========== ГЛАВНЫЙ ЭКРАН ========== -->
<div id="main-screen" class="screen">
    <header class="main-header">
        <div class="header-left">
            <img id="user-avatar-header" src="https://ui-avatars.com/api/?name=U&background=6366f1&color=fff" class="avatar" alt="Avatar">
            <div class="header-info">
                <h3 id="tab-title">Woops</h3>
                <span class="text-muted" id="header-subtitle">4 вкладки</span>
            </div>
        </div>
        <div class="header-actions">
            <button id="logout-btn" class="icon-btn" title="Выйти">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </header>

    <div class="tabs-container">

        <!-- 💬 ВКЛАДКА: ЧАТЫ -->
        <div id="tab-chats" class="tab active">
            <div class="search-bar">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="chat-search" placeholder="Поиск по чатам...">
            </div>
            <ul id="chat-list" class="chat-list"></ul>
            <div id="chats-empty" class="empty-state" style="display:none;">
                <div class="empty-icon">💬</div>
                <p>Пока нет чатов</p>
                <button id="add-chat-contact-btn" class="btn primary small">Добавить контакт</button>
            </div>
            <div id="chats-loading" class="loading-state" style="display:none;">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
        </div>

        <!-- 👥 ВКЛАДКА: КОНТАКТЫ -->
        <div id="tab-contacts" class="tab">
            <div class="search-bar">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="contact-search" placeholder="Поиск контактов...">
            </div>
            <button id="add-contact-btn-main" class="btn primary full" style="margin:16px 8px;">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Добавить контакт
            </button>
            <ul id="contacts-list" class="chat-list"></ul>
            <div id="contacts-empty" class="empty-state">
                <div class="empty-icon">👥</div>
                <p>Контактов пока нет</p>
            </div>
            <div id="contacts-loading" class="loading-state" style="display:none;">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
        </div>

        <!-- 📝 ВКЛАДКА: ЗАМЕТКИ -->
        <div id="tab-notes" class="tab">
            <div class="notes-header">
                <button id="add-note-btn" class="btn primary small">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Новая заметка
                </button>
            </div>
            <div id="notes-list" class="notes-list"></div>
            <div id="notes-empty" class="empty-state">
                <div class="empty-icon">📝</div>
                <p>Заметок пока нет</p>
            </div>
            <div id="notes-loading" class="loading-state" style="display:none;">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
        </div>

        <!-- 👤 ВКЛАДКА: ПРОФИЛЬ -->
        <div id="tab-profile" class="tab">
            <div class="profile-card">
                <div class="avatar-upload">
                    <img id="profile-avatar-preview" src="" class="avatar huge" alt="Profile">
                    <label for="profile-avatar-input" class="btn secondary small">Изменить фото</label>
                    <input type="file" id="profile-avatar-input" accept="image/*" hidden>
                </div>
                <div class="profile-fields">
                    <div class="field-group">
                        <label>Имя</label>
                        <input type="text" id="profile-name" placeholder="Ваше имя">
                    </div>
                    <div class="field-group">
                        <label>Email</label>
                        <input type="email" id="profile-email" placeholder="Email" disabled>
                    </div>
                    <div class="field-group">
                        <label>Статус</label>
                        <select id="profile-status">
                            <option value="online">В сети</option>
                            <option value="busy">Занят</option>
                            <option value="away">Отошёл</option>
                            <option value="offline">Не в сети</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Текст статуса</label>
                        <input type="text" id="profile-status-text" placeholder="Чем занимаетесь?">
                    </div>
                </div>
                <button id="save-profile-btn" class="btn primary full" style="margin-top:16px;">Сохранить профиль</button>
            </div>
        </div>

    </div>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="chats">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
            <span>Чаты</span>
        </button>
        <button class="nav-btn" data-tab="contacts">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span>Контакты</span>
        </button>
        <button class="nav-btn" data-tab="notes">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Заметки</span>
        </button>
        <button class="nav-btn" data-tab="profile">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </button>
    </nav>
</div>

<!-- ========== ЭКРАН ЧАТА ========== -->
<div id="chat-screen" class="screen">
    <header class="chat-header">
        <button id="back-btn" class="icon-btn back">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <img id="chat-avatar" src="" class="avatar" alt="">
        <div class="chat-name-block">
            <h3 id="chat-name">Собеседник</h3>
            <span id="chat-status" class="text-muted">в сети</span>
        </div>
    </header>

    <div id="msg-area" class="msg-area"></div>

    <footer class="chat-footer">
        <button id="emojiToggle" class="icon-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
        <div class="emoji-picker" id="emojiPicker"></div>
        <div class="input-wrapper">
            <input type="text" id="text-input" placeholder="Сообщение..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="text" data-form-type="other" data-lpignore="true">
        </div>
        <button id="send-btn" class="icon-btn send">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </footer>
</div>

<!-- ========== МОДАЛКА: ДОБАВИТЬ КОНТАКТ ========== -->
<dialog id="addContactModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Добавить контакт</h3>
            <button id="closeAddContact" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="field-group">
                <label>Имя</label>
                <input type="text" id="contact-name-input" placeholder="Имя контакта">
            </div>
            <div class="field-group">
                <label>Email</label>
                <input type="email" id="contact-email-input" placeholder="friend@email.com">
            </div>
        </div>
        <div class="modal-footer">
            <button id="cancelAddContact" class="btn secondary">Отмена</button>
            <button id="sendInvite" class="btn primary">Добавить</button>
        </div>
    </div>
</dialog>

<!-- ========== МОДАЛКА: РЕДАКТИРОВАТЬ ЗАМЕТКУ ========== -->
<dialog id="noteModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="noteModalTitle">Новая заметка</h3>
            <button id="closeNote" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="field-group">
                <label>Заголовок</label>
                <input type="text" id="note-title-input" placeholder="Заголовок заметки">
            </div>
            <div class="field-group">
                <label>Текст</label>
                <textarea id="note-text-input" rows="6" placeholder="Введите текст..."></textarea>
            </div>
            <div class="field-group">
                <label>Цвет</label>
                <div class="color-picker" id="noteColorPicker">
                    <button class="color-swatch active" data-color="6366f1" style="background:#6366f1;"></button>
                    <button class="color-swatch" data-color="22c55e" style="background:#22c55e;"></button>
                    <button class="color-swatch" data-color="f59e0b" style="background:#f59e0b;"></button>
                    <button class="color-swatch" data-color="ef4444" style="background:#ef4444;"></button>
                    <button class="color-swatch" data-color="8b5cf6" style="background:#8b5cf6;"></button>
                    <button class="color-swatch" data-color="ec4899" style="background:#ec4899;"></button>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="deleteNote" class="btn secondary" style="color:var(--danger); margin-right:auto;">Удалить</button>
            <button id="cancelNote" class="btn secondary">Отмена</button>
            <button id="saveNote" class="btn primary">Сохранить</button>
        </div>
    </div>
</dialog>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
