<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Woops Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <div class="auth-card">
            <h2>Woops </h2>
            <p>Вход в аккаунт</p>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Пароль">
            <div id="auth-error" class="error-text"></div>
            <button id="login-btn" class="btn primary full-width">Войти</button>
            <button id="register-btn" class="btn secondary full-width" style="margin-top: 10px;">Регистрация</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="main-screen" class="screen">
     <header class="main-header">
    <h1 id="tab-title">Чаты</h1>
    <div style="display: flex; gap: 8px;">
        <!-- Кнопка темы со встроенным кодом твоего солнца (stroke заменен на currentColor) -->
        <button id="theme-toggle" class="icon-btn" title="Сменить тему">
            <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
        <!-- Кнопка выхода со встроенным кодом твоей стрелки -->
        <button id="logout-btn" class="icon-btn" title="Выйти">
            <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4"/>
                <polyline points="16 9 21 12 16 15"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
        </button>
    </div>
</header>

        <div class="tabs-container">
            <!-- Вкладка: Чаты -->
            <div id="tab-chats" class="tab active">
                <div class="search-bar">
                    <input type="text" id="user-search" placeholder="Поиск по имени...">
                </div>
                <ul id="chat-list" class="chat-list">
                    <li id="chats-empty" class="empty-state">Пока никого нет.<br>Найдите друга через поиск! 🧐</li>
                </ul>
            </div>

            <!-- Вкладка: Лента -->
            <div id="tab-feed" class="tab">
                <div class="feed-composer">
                    <textarea id="feed-input" placeholder="Что у вас нового? 📝" rows="3"></textarea>
                    <button id="post-btn" class="btn primary full-width">Опубликовать</button>
                </div>
                <div id="feed-list" class="feed-list"></div>
            </div>

            <!-- Вкладка: Профиль -->
            <div id="tab-profile" class="tab">
                <div class="profile-view">
                    <img id="profile-avatar-view" class="avatar huge" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="Аватар">
                    <h2 id="profile-name-view">Пользователь</h2>
                    <p id="profile-status-view" class="text-muted">В сети</p>
                    <div class="profile-actions">
                        <button id="edit-profile" class="btn primary">Редактировать профиль</button>
                        <button id="delete-profile-btn" class="btn danger">Удалить аккаунт</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="chats">
                <span class="nav-icon">💬</span>
                <span>Чаты</span>
            </button>
            <button class="nav-btn" data-tab="feed">
                <span class="nav-icon">📰</span>
                <span>Лента</span>
            </button>
            <button class="nav-btn" data-tab="profile">
                <span class="nav-icon">👤</span>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <!-- Экран чата -->
    <div id="chat-screen" class="screen">
        <header class="chat-header">
            <button id="back-btn" class="icon-btn">←</button>
            <img id="chat-avatar" class="avatar" src="" alt="">
            <div class="chat-info">
                <h4 id="chat-name">Собеседник</h4>
                <p id="chat-status">в сети</p>
            </div>
        </header>
        <div id="msg-area" class="msg-area"></div>
        <footer class="chat-footer">
            <button id="emoji-toggle" class="icon-btn">😊</button>
            <div class="input-wrapper">
              <input type="text" id="text-input" placeholder="Сообщение..." autocomplete="off" autocorrect="off" autocapitalize="off">
            </div>
            <button id="send-btn" class="icon-btn send">➤</button>
        </footer>
        <div id="emoji-picker" class="emoji-picker"></div>
    </div>

    <!-- Модалка редактирования профиля -->
    <dialog id="profile-modal" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Редактировать профиль</h3>
                <button id="close-profile-modal" class="icon-btn">✕</button>
            </div>
            <div class="modal-body">
                <label>Имя</label>
                <input type="text" id="edit-name" placeholder="Ваше имя">
                
                <label>Статус</label>
                <select id="edit-status">
                    <option value="online">В сети</option>
                    <option value="busy">Занят</option>
                    <option value="away">Отошёл</option>
                    <option value="offline">Не в сети</option>
                </select>

                <label>Текст статуса</label>
                <input type="text" id="edit-status-text" placeholder="О себе...">

                <label>Аватар</label>
                <div id="avatar-selector" class="avatar-selector"></div>
            </div>
            <div class="modal-footer">
                <button id="cancel-profile" class="btn secondary">Отмена</button>
                <button id="save-profile" class="btn primary">Сохранить</button>
            </div>
        </div>
    </dialog>

    <!-- Модалка редактирования поста -->
    <dialog id="edit-post-modal" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Редактировать пост</h3>
                <button id="close-edit-post-modal" class="icon-btn">✕</button>
            </div>
            <div class="modal-body">
                <textarea id="edit-post-text" rows="4" placeholder="Текст поста..."></textarea>
            </div>
            <div class="modal-footer">
                <button id="cancel-edit-post" class="btn secondary">Отмена</button>
                <button id="save-edit-post" class="btn primary">Сохранить</button>
            </div>
        </div>
    </dialog>

    <!-- Уведомление -->
    <div id="toast" class="toast"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
