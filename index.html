<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Woops</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="screen">
        <div class="card auth-card">
            <h2 class="logo-text">Woops</h2>
            <p class="text-muted">Вход в аккаунт</p>
            <input type="email" id="email" placeholder="Email" autocomplete="email">
            <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
            <p id="auth-error" class="error-text"></p>
            <div class="btn-group">
                <button id="login-btn" class="btn primary">Войти</button>
                <button id="register-btn" class="btn secondary">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div id="main-screen" class="screen">
        <header class="main-header">
            <h2 id="page-title">Чаты</h2>
            <button id="logout-btn" class="icon-btn" title="Выйти">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </header>

        <div class="tabs-container">
            <!-- ЧАТЫ -->
            <div id="tab-chats" class="tab active">
                <div id="chat-list"></div>
                <div id="chats-empty" class="empty-state" style="display:none;">Нет чатов. Добавьте контакт!</div>
            </div>

            <!-- ЛЕНТА -->
            <div id="tab-feed" class="tab">
                <div class="feed-composer">
                    <textarea id="post-text" rows="2" placeholder="Что нового?"></textarea>
                    <button id="publish-btn" class="btn primary">Опубликовать</button>
                </div>
                <div id="feed-list"></div>
                <div id="feed-empty" class="empty-state" style="display:none;">Лента пуста</div>
            </div>

            <!-- КОНТАКТЫ -->
            <div id="tab-contacts" class="tab">
                <div class="search-add-row">
                    <input type="text" id="contact-search" placeholder="Поиск контактов...">
                    <button id="add-contact-btn" class="btn primary">+</button>
                </div>
                <div id="contacts-list"></div>
                <div id="contacts-empty" class="empty-state" style="display:none;">Нет контактов</div>
            </div>

            <!-- ПРОФИЛЬ -->
            <div id="tab-profile" class="tab">
                <div class="profile-preview">
                    <img id="profile-avatar" src="" class="avatar huge" alt="Avatar">
                    <h3 id="profile-name">Имя</h3>
                    <p id="profile-username" class="text-muted">@username</p>
                    <p id="profile-status-text" class="text-sm"></p>
                </div>
                
                <div class="profile-actions">
                    <button id="btn-change-avatar" class="action-btn" title="Выбрать аватар">📷</button>
                    <button id="btn-edit-profile" class="action-btn" title="Редактировать">✏️</button>
                    <button id="btn-settings" class="action-btn" title="Настройки">⚙️</button>
                </div>

                <div class="section">
                    <h4>Мои публикации</h4>
                    <div id="my-posts-list"></div>
                    <p id="my-posts-empty" class="text-muted" style="display:none;">Нет публикаций</p>
                </div>

                <button id="btn-delete-profile" class="btn secondary full-width danger-text">Удалить профиль</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="chats"><span class="nav-icon">💬</span><span>Чаты</span></button>
            <button class="nav-btn" data-tab="feed"><span class="nav-icon">📱</span><span>Лента</span></button>
            <button class="nav-btn" data-tab="contacts"><span class="nav-icon">👥</span><span>Контакты</span></button>
            <button class="nav-btn" data-tab="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
        </nav>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="screen">
        <header class="chat-header">
            <button id="back-btn" class="icon-btn" type="button">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <img id="chat-avatar" src="" class="avatar small" alt="">
            <div class="chat-header-info">
                <h4 id="chat-name">Имя</h4>
                <span id="chat-status" class="text-muted text-xs">в сети</span>
            </div>
        </header>

        <div id="msg-area" class="msg-area"></div>

        <footer class="chat-footer">
            <button id="emoji-toggle" class="icon-btn" type="button">☺</button>
            <div id="emoji-panel" class="emoji-panel">
                <div id="emoji-grid" class="emoji-grid"></div>
            </div>
            <div class="input-wrapper">
                <input type="text" id="text-input" placeholder="Сообщение..." autocomplete="off" autocapitalize="none" spellcheck="false">
            </div>
            <button id="send-btn" class="btn primary send-btn" type="button">➤</button>
        </footer>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <dialog id="avatar-modal" class="modal">
        <div class="modal-content">
            <h3>Выберите аватар</h3>
            <div id="avatar-selection-grid" class="avatar-grid"></div>
            <button class="btn secondary full-width" onclick="this.closest('dialog').close()">Закрыть</button>
        </div>
    </dialog>

    <dialog id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <input type="text" id="edit-name" placeholder="Отображаемое имя">
            <input type="text" id="edit-username" placeholder="@username (для поиска)">
            <input type="text" id="edit-status" placeholder="О себе">
            <div class="btn-group">
                <button class="btn secondary" onclick="this.closest('dialog').close()">Отмена</button>
                <button id="save-profile-btn" class="btn primary">Сохранить</button>
            </div>
        </div>
    </dialog>

    <dialog id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Настройки</h3>
            <div class="setting-row">
                <span>Темная тема</span>
                <label class="switch">
                    <input type="checkbox" id="theme-switch">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn secondary full-width" onclick="this.closest('dialog').close()">Закрыть</button>
        </div>
    </dialog>

    <dialog id="add-contact-modal" class="modal">
        <div class="modal-content">
            <h3>Добавить контакт</h3>
            <input type="email" id="new-contact-email" placeholder="Email пользователя">
            <div class="btn-group">
                <button class="btn secondary" onclick="this.closest('dialog').close()">Отмена</button>
                <button id="confirm-add-contact" class="btn primary">Добавить</button>
            </div>
        </div>
    </dialog>

    <!-- Уведомления -->
    <div id="toast" class="toast"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
